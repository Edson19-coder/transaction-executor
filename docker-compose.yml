version: '3.8'

services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-db-container
    ports:
      - "1522:1522"
    environment:
      - ORACLE_PASSWORD=PasswordMaster123#
    volumes:
      - ./init.sql:/container-entrypoint-initdb.d/init.sql
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "exec sqlplus -s sys/PasswordMaster123#@//localhost:1521/ORCLPDB as sysdba <<EOF\nexit;\nEOF"]
      interval: 15s
      timeout: 10s
      retries: 5

  transaction-executor:
    build: src
    container_name: transaction-executor-app
    ports:
      - "9001:9001"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/orclpdb
    depends_on:
      oracle-db:
        condition: service_healthy

volumes:
  oracle_data: